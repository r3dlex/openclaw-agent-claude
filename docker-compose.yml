services:
  # Factory: Elixir/OTP backend managing Claude CLI sessions
  # The OpenClaw gateway runs on the host (port 18789) — no Docker container needed.
  factory:
    build:
      context: ./factory
      dockerfile: Dockerfile
    volumes:
      - ${AGENT_DATA_DIR:-./data}:/data:rw
      - ../skills-cli:/skills-cli:ro
      - ../skills:/workspace/skills:rw
      - ./skills:/agent/skills:rw
    env_file:
      - .env
    environment:
      IAMQ_HTTP_URL: http://host.docker.internal:18790
      IAMQ_WS_URL: ws://host.docker.internal:18793/ws
      IAMQ_AGENT_ID: agent_claude
      EMBEDDINGS_URL: http://host.docker.internal:18795
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FACTORY_PORT:-4000}:${FACTORY_PORT:-4000}"
    restart: unless-stopped
