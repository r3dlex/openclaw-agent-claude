<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Anvil (rounded rectangle) -->
  <rect x="24" y="72" width="80" height="24" rx="6" ry="6" fill="#FF6B35"/>
  <!-- Anvil base -->
  <rect x="36" y="96" width="56" height="10" rx="4" ry="4" fill="#FF6B35"/>
  <!-- Anvil top surface -->
  <rect x="32" y="64" width="64" height="12" rx="3" ry="3" fill="#FF6B35"/>
  <!-- Hammer handle (diagonal) -->
  <line x1="82" y1="56" x2="48" y2="22" stroke="#FF6B35" stroke-width="8" stroke-linecap="round"/>
  <!-- Hammer head -->
  <rect x="28" y="14" width="28" height="16" rx="4" ry="4" fill="#FF6B35" transform="rotate(-45 42 22)"/>
</svg>
