name: PR Review Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  pre-commit-checks:
    name: Pre-commit Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline runner
        working-directory: tools/pipeline_runner
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run pre-commit pipeline
        working-directory: tools/pipeline_runner
        run: poetry run pipeline run pre-commit --project ../.. --ci --json-output > /tmp/results.json || true

      - name: Display results
        working-directory: tools/pipeline_runner
        run: poetry run pipeline run pre-commit --project ../.. --ci

  sensitive-data-scan:
    name: Sensitive Data Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets in diff
        run: |
          echo "Scanning PR diff for sensitive patterns..."
          PATTERNS=(
            'ANTHROPIC_API_KEY'
            'sk-[a-zA-Z0-9]{20,}'
            'BEGIN.*PRIVATE KEY'
            'password\s*[:=]\s*["\x27][^\s]+'
            'api_key\s*[:=]\s*["\x27][a-zA-Z0-9]+'
            '/Users/'
            '/Volumes/'
            '/home/[a-z]+/'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if git diff origin/main...HEAD -- ':(exclude).github/' | grep -qiE "$pattern"; then
              echo "WARNING: Pattern found in diff: $pattern"
              git diff origin/main...HEAD -- ':(exclude).github/' | grep -niE "$pattern" | head -5
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "Sensitive data patterns detected in PR diff"
            exit 1
          fi
          echo "No sensitive data patterns found"
