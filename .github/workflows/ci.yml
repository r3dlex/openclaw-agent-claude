name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline runner
        working-directory: tools/pipeline_runner
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run security pipeline
        working-directory: tools/pipeline_runner
        run: poetry run pipeline run security --project ../.. --ci

  architecture:
    name: Architecture Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline runner
        working-directory: tools/pipeline_runner
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run architecture pipeline
        working-directory: tools/pipeline_runner
        run: poetry run pipeline run architecture --project ../.. --ci

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline runner
        working-directory: tools/pipeline_runner
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run quality pipeline
        working-directory: tools/pipeline_runner
        run: poetry run pipeline run quality --project ../.. --ci

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline runner
        working-directory: tools/pipeline_runner
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run pytest
        working-directory: tools/pipeline_runner
        run: poetry run pytest

  test-elixir:
    name: Elixir Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install dependencies
        working-directory: factory
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile
        working-directory: factory
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test

      - name: Run tests
        working-directory: factory
        run: mix test --cover
        env:
          MIX_ENV: test

  # Gate job that requires all checks to pass
  ci-pass:
    name: CI Pass
    needs: [security, architecture, quality, test-python, test-elixir]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "Security pipeline failed"
            exit 1
          fi
          if [[ "${{ needs.architecture.result }}" != "success" ]]; then
            echo "Architecture pipeline failed"
            exit 1
          fi
          if [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "Quality pipeline failed"
            exit 1
          fi
          if [[ "${{ needs.test-python.result }}" != "success" ]]; then
            echo "Python tests failed"
            exit 1
          fi
          if [[ "${{ needs.test-elixir.result }}" != "success" ]]; then
            echo "Elixir tests failed"
            exit 1
          fi
          echo "All CI checks passed"
